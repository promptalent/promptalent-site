<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merci — PrompTalent</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: Helvetica, Arial, sans-serif;
  background: #1a1740;
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 24px;
}
.logo { font-size: 24px; font-weight: 700; margin-bottom: 40px; color: rgba(255,255,255,0.6); }
.logo span { color: #FCDE5A; }
.check { font-size: 56px; margin-bottom: 24px; }
h1 { font-size: clamp(28px, 4vw, 42px); font-weight: 800; margin-bottom: 16px; letter-spacing: -1px; }
h1 span { color: #FCDE5A; }
p { font-size: 16px; color: rgba(255,255,255,0.5); line-height: 1.75; max-width: 440px; margin-bottom: 36px; }
.btn {
  display: inline-block; background: #FCDE5A; color: #1a1740;
  font-size: 15px; font-weight: 700; padding: 14px 32px;
  border-radius: 8px; text-decoration: none; transition: all 0.2s;
}
.btn:hover { background: #E8C93A; transform: translateY(-1px); }
</style>
</head>
<body>
  <div class="logo">Promp<span>Talent</span></div>
  <div class="check">✅</div>
  <h1>Merci pour ton <span>achat !</span></h1>
  <p>Ton guide va être envoyé à ton adresse email dans quelques secondes. Pense à vérifier tes spams si tu ne le reçois pas.</p>
  <a href="index.html" class="btn">Retour à l'accueil →</a>
</body>
</html>
